title: "Game Guides"
description: "Game guides and strategy wiki"
url: "https://games.taka97it.com"
baseurl: ""

theme: jekyll-text-theme

# --- TeXt theme ---
text_skin: default
highlight_theme: tomorrow-night-eighties
lang: en

search:
  provider: default

# --- Plugins (jekyll-feed/paginate/jemoji pulled in by the theme gem) ---
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-sitemap
  - jemoji

# --- Wiki defaults for all pages (home pages override layout to `page`) ---
# Titles come from each page's own body H1, so TeXt's article <h1> is suppressed.
# No blog chrome (dates/comments/sharing/pageview) on a static guides wiki.
defaults:
  - scope:
      path: ""
    values:
      layout: article
      show_title: false
      comment: false
      sharing: false
      pageview: false

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - docs/
  - plans/
  - README.md
  - .text-gem-inspect/
