# UI-string locales for the TeXt theme. Overrides the gem's _data/locale.yml.
# get-locale-string.html looks up site.data.locale[page.lang] and falls back to
# `en` for any missing key. Only the two languages this site ships are defined.

## => English
en:
  SUBSCRIBE               : "Subscribe"
  READMORE                : "Read more"
  SEARCH                  : "Search"
  CANCEL                  : "Cancel"
  VIEWS                   : "views"
  LAST_UPDATED            : "Last updated"
  PREVIOUS                : "PREVIOUS"
  NEXT                    : "NEXT"
  ARTICLE_DATE_FORMAT     : "%b %d, %Y"
  ARTICLE_LIST_DATE_FORMAT: "%b %d"
  STATISTICS              : "[POST_COUNT] post articles, [PAGE_COUNT] pages."
  LICENSE_ANNOUNCE        : "This work is licensed under a [LICENSE] license."
  POST_ON_GITHUB          : "Edit on Github"
  FOLLOW_ME               : "Follow me on [NAME]."
  FOLLOW_US               : "Follow us on [NAME]."
  EMAIL_ME                : "Send me an Email."
  EMAIL_US                : "Send us an Email."
  COPYRIGHT_DATES         : "2026"

